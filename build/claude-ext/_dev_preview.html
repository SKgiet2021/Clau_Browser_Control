<!DOCTYPE html>
<!-- _dev_preview.html — TEMPORARY harness to preview sidepanel UI outside Chrome.
     Stubs the chrome.* APIs and seeds fake providers/conversations. NOT part of the extension. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>sidepanel dev preview</title>
<link rel="stylesheet" href="sidepanel.css">
<style>html,body{width:400px;margin:0 auto;}</style>
<script>
  const SEED = {
    nocdp_providers: {
      providers: [{
        id: "p_demo", name: "OllamaCloud", style: "openai",
        baseUrl: "https://api.openai.com/v1", apiKey: "sk-demo",
        models: [
          { id: "claude-fable-5", displayName: "Fable 5", vision: true },
          { id: "claude-opus-4-8", displayName: "Opus 4.8", vision: true },
          { id: "claude-sonnet-5", displayName: "Sonnet 5", vision: false },
        ],
      }],
      activeProviderId: "p_demo", activeModelId: "claude-opus-4-8",
    },
    nocdp_theme: "dark",
    nocdp_conversations: {
      currentId: "c1",
      list: [
        { id: "c1", title: "Yo, What's up", createdAt: Date.now() - 86400e3, updatedAt: Date.now() - 3600e3,
          messages: [
            { role: "user", content: "Yo, What's up....." },
            { role: "assistant", content: "Nothing Much Just Hanging around" },
            { role: "user", content: "Summarize this page for me" },
            { role: "assistant", content: "[[tool:read_page]]\nHere's the gist: it's a **liquid-glass chat UI** for your browser agent — glass nav, chat history, and a provider manager.\n\n- Glass material everywhere\n- iOS gel-spring toggles\n- `backdrop-filter` refraction\n\nClean, green, and very Apple. 🌿" },
          ] },
        { id: "c2", title: "VPS setup", createdAt: Date.now() - 2 * 86400e3, updatedAt: Date.now() - 2 * 86400e3, messages: [{ role: "user", content: "hardening checklist?" }] },
        { id: "c3", title: "Scraper project", createdAt: Date.now() - 3 * 86400e3, updatedAt: Date.now() - 3 * 86400e3, messages: [{ role: "user", content: "playwright vs the anti-bot wall" }] },
      ],
    },
    nocdp_effort: "off",
  };
  window.chrome = {
    storage: {
      local: {
        get: async (keys) => { const out = {}; (Array.isArray(keys) ? keys : [keys]).forEach(k => { if (k in SEED) out[k] = SEED[k]; }); return out; },
        set: async (obj) => Object.assign(SEED, obj),
      },
      onChanged: { addListener() {} },
    },
    tabs: {
      query: async () => [{ id: 1, title: "Demo tab", url: "https://example.com", active: true, windowId: 1 }],
      get: async (id) => ({ id, active: true, windowId: 1 }),
      update: async () => {}, create: async () => ({ id: 2 }), remove: async () => {},
      onRemoved: { addListener() {} },
      sendMessage: async () => { throw new Error("no actor in preview"); },
      captureVisibleTab: async () => { throw new Error("no capture in preview"); },
    },
    debugger: { onDetach: { addListener() {} }, attach: async () => {}, detach() {}, sendCommand: async () => ({}) },
    scripting: { executeScript: async () => [{ result: null }] },
  };
</script>
</head>
<body>
<div id="root"></div>
<script src="sidepanel.js"></script>
</body>
</html>
